[workspace]
name = "bless"
version = "0.2.0"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64"]

[dependencies]
rust = ">=1.74"

[feature.docs.dependencies]
python = ">=3.11"
pip = "*"
emacs = "*"
sphinx = ">=7"
myst-parser = "*"
sphinx-sitemap = "*"

[feature.docs.pypi-dependencies]
shibuya = "*"

[feature.docs.tasks]
orgbld = { cmd = "emacs --batch -l docs/export.el", description = "Export orgmode to RST" }
docbld = { cmd = "sphinx-build docs/source docs/build -b html", depends-on = ["orgbld"], description = "Build full documentation" }

[feature.rpc.dependencies]
capnproto = ">=1.0.2,<2"

[feature.rpc.tasks]
build-serve = { cmd = "cargo build --release --features serve", description = "Build with serve mode" }

[feature.dev.tasks]
check = { cmd = "cargo fmt --check && cargo clippy -- -D warnings && cargo test" }
build = { cmd = "cargo build --release" }

[environments]
docs = { features = ["docs"], solve-group = "default" }
rpc = { features = ["rpc"], solve-group = "default" }
dev = { features = ["dev"], solve-group = "default" }
